<!DOCTYPE html>
<html lang="en">
    <head>
 <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>登录</title>
 <link rel="stylesheet" href="login.css">
 <script >
    // 密码可见性切换函数
    function passwordVisibility() {
      const passwordInput = document.getElementById('password');
      const btn = document.getElementById('passwordBtn');

      // 核心逻辑：判断当前类型
      if (passwordInput.type === 'password') {
        // 如果是密文，就改成明文
        passwordInput.type = 'text';
        btn.innerText = '隐藏密码'; // 修改按钮文字
      } else {
        // 如果是明文，就改回密文
        passwordInput.type = 'password';
        btn.innerText = '显示密码'; // 修改按钮文字
      }
    }
    
    //待写完后可接入微信的api
    
    document.addEventListener('DOMContentLoaded', function()/* 等待DOM加载完成 */{
      document.querySelector('.login-form').addEventListener('submit', function(event) {
        event.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        
        // 统一用户名验证逻辑
        if(username=="admin"&&password=="123456")
        {
          alert("登录成功");
          const loginContent = document.querySelector('.login-content');
          loginContent.classList.add('fly-away');
      //classList.add('fly-away') 是 JavaScript 中用于动态给 HTML 元素添加 CSS 类名的标准方法。用于添加属性
      
          setTimeout(() => {
            window.location.replace("index.html");
          }, 1200);
        }
        
        else
        {
          alert("用户名或密码错误");
        }
      });
    });
 </script>
</head>
<body>
<div class="login">
      <div class="login-content">
        <div class="decorative-element top"></div>
        <div class="decorative-element bottom"></div>
        <div class="login-brand">
          <div class="brand-icon">🌱</div>
        </div>
        <header>AI习惯追踪仪表盘</header>
        <form class="login-form" action="" method="post">
          <div class="form-item">
            <label for="username">用户名:</label>
            <input id="username" placeholder="请输入用户名" required>
          </div>
          <div class="form-item">
            <label for="password">密码:</label>
            <input id="password" type="password" placeholder="请输入密码" required>
            <button type="button" onclick="passwordVisibility()" id="passwordBtn">显示密码</button>
          </div>
          <div class="form-item">
            <button type="submit">登录</button>
          </div>
        </form>
      </div>
    </div>
    </body>
    </html>
