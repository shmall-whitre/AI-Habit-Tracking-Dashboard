<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI习惯追踪仪表盘</title>
  </head>
  <body>
    <section>
     <header>
      <h1>习惯追踪</h1>
      <p>记录和管理您的习惯，实现更高效的生活</p>
    </header>
    <button id="themeToggle">
      <span class="icon">☀️</span>
    </button>
    <button id="ai" href="https://www.baidu.com">🤖AI建议</button>
    </section>

    <section id="stats">
      <div>
        <h2>📅总习惯</h2>
          <span>已经添加0个习惯</span>
      </div>
          <div>
            <h2>✅今日完成</h2>
             <span>完成0个</span>
          </div>
            <div>
                <h2>🔥连胜天数</h2>
                  <span>已连胜0天</span>        
            </div>
               <div>
                  <h2>📊完成率</h2>
                    <span>0%</span>
                </div>
    </section>
<!-- 主内容区域 -->

<main>
 <section>
   <header>➕添加习惯</header>
  <form>
   <label for="iterm1">习惯名称:</label>
    <input id="iterm1"placeholder="例如:每天阅读30分钟">
    <label for="iterm2">习惯描述:</label>
    <select id="iterm2">
      <option value="health">健康</option>
      <option value="study">学习</option>
      <option value="social">社交</option>
    </select>
   <label for="iterm3">频率</label>
   <input list="select1" id="iterm3">
    <datalist id="select1">
      <option value="everyday"></option>
      <option value="everyweek"></option>
  </datalist>
  <button type="submit">添加习惯</button>
  </form>
 </section>

 <section>
 <div>
  <h3>🗒️我的习惯</h3>
  <button id="filterAll" data-filter="all">所有习惯</button>
  <button id="filterHealth" data-filter="health">健康</button>
  <button id="filterStudy" data-filter="study">学习</button>
  <button id="filterSocial" data-filter="social">社交</button>
  </div>
  <!-- 显示已添加习惯的列表 -->
<div>
<!--由js动态生成习惯列表-->
</div>
<div>
  <h6>🌳</h6>
  <p>还没有习惯</p>
  <p>请添加一些习惯开始，开始你的成长之旅吧！</p>
</div>
 </section>
</main>
  <section>
<header>📊数据可视化</header>
<div>
  <H1>七天完成热力图</H1>
  <button type="button">六</button>  
  <button type="button">日</button>
  <button type="button">一</button>
  <button type="button">二</button>
  <button type="button">三</button>
  <button type="button">四</button> 
  <button type="button">五</button>
</div>
<div>
  <h1>本周进度</h1>
  <div>
    <span>暂无数据</span>
  </div>
</div>
  </section>
<footer>
<span>💪 坚持就是胜利 | 数据存储在本地，隐私安全</span>
</footer>
  </body>
</html>
