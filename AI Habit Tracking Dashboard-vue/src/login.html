<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AI习惯追踪</title>
    <link rel="stylesheet" href="login.css">
    <script src="login.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="form-section">
            <h2>创建账号</h2>
            <form id="form" >
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input name="name" type="text" id="username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label for="email">邮箱</label>
                    <input name="email" type="email" id="email" placeholder="请输入邮箱" required>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input name="password" type="password" id="password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="signup-btn">创建账号</button>
                <div class="form-toggle">
                    <p>已有账号？ <a href="javascript:void(0)" onclick="switchToLogin()">登录</a></p>
                    
                </div>
            </form>
            <div class="social-login">
                <p>或使用以下方式登录</p>
                <div class="social-buttons">
                    <div class="social-btn">G</div>
                    <div class="social-btn">F</div>
                    <div class="social-btn">X</div>
                </div>
            </div>
        </div>
        <div class="welcome-section">
            <h2>欢迎回来！</h2>
            <p>输入您的个人信息以登录<br>或创建一个新账户</p>
            <button class="login-btn" onclick="switchToLogin()">登录</button>
        </div>
    </div>
</body>
</html>
